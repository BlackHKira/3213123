    - export YQ_BIN="$(pwd)/.bin-yq"
    - ${YQ_BIN} --version

    - chmod +x scripts/build-native-config.sh
    - chmod +x scripts/build-all-native-config.sh
    - SERVICES="${CONFIG_SERVICES}" YQ_BIN="${YQ_BIN}" ./scripts/build-all-native-config.sh "${ENV_NAME}" "${CONFIG_SOURCE_DIR}"

    - test -d build/native-config/config
    - find build/native-config/config -maxdepth 3 -type f | sort

    - >
      docker build
