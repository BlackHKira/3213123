    - export ENV_NAME="$(echo "${CI_COMMIT_TAG}" | cut -d'_' -f1)"
    - export IMAGE_FULL="${IMAGE_REPO}:${IMAGE_TAG}"
    - echo "ENV_NAME=${ENV_NAME}"
    - echo "IMAGE_FULL=${IMAGE_FULL}"
    - docker info

    - wget -O ./.bin-yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
