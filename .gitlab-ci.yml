      -t "${IMAGE_FULL}"
      --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      --build-arg VCS_REF="${CI_COMMIT_SHORT_SHA}"
      --build-arg VERSION="${IMAGE_TAG}"
      --label "git.commit=${CI_COMMIT_SHA}"
      --label "git.branch=${CI_COMMIT_REF_NAME}"
      --label "git.tag=${CI_COMMIT_TAG}"
      --label "pipeline.id=${CI_PIPELINE_ID}"
      --label "pipeline.url=${CI_PIPELINE_URL}"
      --label "service.name=${SERVICE_NAME}"
      --label "config.env=${ENV_NAME}"
      "${BUILD_CONTEXT}"

    - docker push "${IMAGE_FULL}"
    - echo "Build completed ${IMAGE_FULL}"

deploy:stag:
  stage: deploy
  tags:
    - dev-f2c-cicd
  needs:
    - job: build:stag
  rules:
    - if: '$CI_COMMIT_TAG =~ /^stag_\d{2}\.\d{2}\.\d{4}_v\d+$/'
