name: CI/CD Pipeline & Security Scan

on:
  push:
    # Tôi thêm cả nhánh stag vào để bạn push lên nhánh nào nó cũng chạy
    branches: [ "main", "stag" ] 
  workflow_dispatch:

jobs:
  # ----------------------------------------
  # 1. Giai đoạn Build Image
  # ----------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Sinh thư mục Native Config
        run: |
          echo "⚙️ Đang chạy script để tạo cấu hình..."
          # Cấp quyền thực thi cho file script
          chmod +x scripts/build-all-native-config.sh
          # Chạy script để sinh ra thư mục build/native-config/config
          ./scripts/build-all-native-config.sh

      - name: Build Docker Image
        run: |
          echo "🏗️ Building Docker Image..."
          docker build -f Dockerfile -t f2c-config-stag:latest .

  # ----------------------------------------
  # 2. Giai đoạn gọi Jenkins (Trigger)
  # ----------------------------------------
  trigger-jenkins:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Bắn tín hiệu sang Jenkins
        run: |
          echo "🚀 Đang gọi Jenkins tại hoangdang.jenkins.com..."
          # Ghi chú: Nếu bạn chưa có Jenkins thật thì dòng này sẽ báo lỗi curl, 
          # bạn có thể comment (#) dòng curl lại để test ZAP trước.
          curl -X POST "http://hoangdang.jenkins.com/job/Run-Test-Stag/build?token=${{ secrets.JENKINS_TOKEN }}" || echo "Bỏ qua lỗi gọi Jenkins"

  # ----------------------------------------
  # 3. Giai đoạn Quét bảo mật bằng ZAP
  # ----------------------------------------
  zap-scan:
    needs: trigger-jenkins
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cấp quyền ghi thư mục cho ZAP
        run: chmod -R 777 $GITHUB_WORKSPACE

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          # Thay bằng URL môi trường Staging thực tế của bạn
          target: 'http://ip-cua-staging-server'
          # Tên file báo cáo sẽ xuất hiện trong tab Artifacts
          report_filename: 'zap-report.html'
          fail_action: false # Không làm sập Pipeline nếu phát hiện lỗi
