springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
  show-actuator: true
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.cloud: INFO
spring:
  application:
    name: integration-service
server:
  servlet:
    context-path: /integration
