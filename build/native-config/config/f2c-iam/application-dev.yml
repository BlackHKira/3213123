springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
  show-actuator: true
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.cloud: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg trace_id=%X{trace_id} span_id=%X{span_id}%n"
server:
  port: 8080
  servlet:
    context-path: /customer/iam
spring:
  application:
    name: f2c-iam
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: false
  messages:
    encoding: UTF-8
    basename: i18n/messages
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DB:0}
      timeout: 2000ms
      ssl:
        enabled: ${REDIS_SSL:false}
        verify-mode: ${REDIS_SSL_VERIFY_MODE:CA}
      lettuce:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
          min-idle: 0
keycloak:
  server-url: ${KEYCLOAK_URL}
  realm: ${KEYCLOAK_REALM}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID}
  admin-client-secret: ${KEYCLOAK_ADMIN_SECRET}
  auth-client-id: ${KEYCLOAK_AUTH_CLIENT_ID}
  auth-client-secret: ${KEYCLOAK_AUTH_SECRET}
  iam-client-id: ${KEYCLOAK_IAM_CLIENT_ID}
  iam-client-secret: ${KEYCLOAK_IAM_SECRET}
  policy-enforcer:
    enforcement-mode: ENFORCING
    http-method-as-scope: true
    paths:
      - path: /api/v1/auth/s/*
        enforcement-mode: DISABLED
      - path: /api/v1/auth/f/*
        enforcement-mode: DISABLED
      - path: /api/v1/auth/b/*
        enforcement-mode: DISABLED
  jwk-set-uri: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs
eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: ${EUREKA_URL}/eureka
custom:
  properties:
    sso:
      base-url: ${SSO_BASE_OTP_URL}
    user:
      lock-ttl: 900
      max-attempts: 5
    otp:
      ttl: 300
      lock-ttl: 300
      max-attempts: 5
      lock_ttl: 300
      info_ttl: 300
    token:
      time-life: ${TOKEN_TIME_LIFE}
      rsa:
        private:
          key: ${RSA_PRIVATE_KEY}
