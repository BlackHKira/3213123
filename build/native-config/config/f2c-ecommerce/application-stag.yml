spring:
  config:
    activate:
      on-profile: stag
  datasource:
    # Trỏ vào Database dành riêng cho môi trường Staging của Ecommerce
    url: jdbc:postgresql://db-stag-host:5432/f2c_ecommerce_stag
    username: ${DB_STAG_USERNAME}
    password: ${DB_STAG_PASSWORD}

server:
  port: 8080 # Hoặc port bạn quy định cho stag

# Cấu hình log riêng cho stag (thường chi tiết hơn prod nhưng ít hơn dev)
logging:
  level:
    com.f2c.ecommerce: INFO
    org.springframework.web: INFO