server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: f2c-iam
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: false
  messages:
    encoding: UTF-8
    basename: i18n/messages
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DB:0}
      timeout: 2000ms
      ssl:
        enabled: ${REDIS_SSL:false}
        verify-mode: ${REDIS_SSL_VERIFY_MODE:CA}
      lettuce:
        pool:
          enabled: true

keycloak:
  server-url: https://dev-f2c-sso.viettelpost.vn/
  realm: f2c

  admin-client-id: f2c-admin-client
  admin-client-secret: HvSApE3Tr3cMp8sntJ5f1Gozb1e8g03B

  auth-client-id: f2c-auth-client
  auth-client-secret: mxYlIrEoLYrMZz9hSiwBxuHyzBxXl56C

  iam-client-id: iam-platform
  iam-client-secret: HmnRLPmlqNSTvkRbu2Wvc37ICsONvzN1

  policy-enforcer:
    enforcement-mode: ENFORCING
    http-method-as-scope: true
    paths:
      - path: /api/v1/auth/s/*
        enforcement-mode: DISABLED
      - path: /api/v1/auth/b/*
        enforcement-mode: DISABLED

  jwk-set-uri: https://dev-f2c-sso.viettelpost.vn/realms/f2c/protocol/openid-connect/certs

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:8888/eureka

custom:
  properties:
    sso:
      base-url: https://dev-otp-verify.viettelpost.vn
    user:
      lock-ttl: 900
      max-attempts: 5
    otp:
      ttl: 60
      lock-ttl: 300
      max-attempts: 5
    token:
      time-life: 1D
      rsa:
        private:
          key: 